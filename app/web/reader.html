<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exocortex Reader</title>
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("exocortex-theme");
        document.documentElement.dataset.theme = savedTheme === "dark" ? "dark" : "light";
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f8;
      --panel: #ffffff;
      --panel-muted: #eef2f4;
      --text: #1b232c;
      --muted: #637082;
      --line: #d8dee6;
      --accent: #1f6f5b;
      --accent-strong: #165444;
      --danger: #a33a3a;
      --shadow: 0 14px 32px rgba(20, 30, 45, 0.08);
      --button-hover-bg: #f9fafb;
      --button-hover-border: #aeb8c5;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #101418;
      --panel: #171d23;
      --panel-muted: #232c35;
      --text: #e6ebf1;
      --muted: #98a6b5;
      --line: #303a45;
      --accent: #2f927b;
      --accent-strong: #55c0a6;
      --danger: #ff8f8f;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      --button-hover-bg: #202832;
      --button-hover-border: #485665;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      line-height: 1.45;
      padding: 10px 12px;
    }

    textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      padding: 0 12px;
    }

    button:hover {
      border-color: var(--button-hover-border);
      background: var(--button-hover-bg);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 56px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
    }

    .toolbar,
    .doc-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 0 12px;
      cursor: pointer;
    }

    .file-label:hover {
      border-color: var(--button-hover-border);
      background: var(--button-hover-bg);
    }

    .file-label input {
      display: none;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 650;
      padding: 0 10px;
    }

    .theme-toggle:hover {
      border-color: var(--button-hover-border);
      background: var(--button-hover-bg);
    }

    .theme-toggle input {
      appearance: none;
      position: relative;
      width: 34px;
      height: 20px;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-muted);
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease;
    }

    .theme-toggle input::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--panel);
      box-shadow: 0 1px 4px rgba(20, 30, 45, 0.22);
      transition: transform 0.16s ease;
    }

    .theme-toggle input:checked {
      border-color: var(--accent);
      background: var(--accent);
    }

    .theme-toggle input:checked::before {
      transform: translateX(14px);
    }

    .status {
      margin-bottom: 12px;
      min-height: 22px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .doc-meta {
      justify-content: space-between;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
      gap: 16px;
      align-items: start;
    }

    .reader,
    .capture-panel {
      min-height: calc(100vh - 170px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .reader {
      padding: 24px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      user-select: text;
    }

    .reader.empty {
      color: var(--muted);
    }

    .capture-panel {
      position: sticky;
      top: 16px;
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label,
    .source-actions label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .source-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .source-field.collapsed textarea {
      display: none;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
    }

    .panel-actions button {
      flex: 1;
    }

    .menu {
      position: fixed;
      z-index: 10;
      display: none;
      min-width: 190px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 6px;
    }

    .menu.open {
      display: grid;
      gap: 4px;
    }

    .menu button {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      border-color: transparent;
    }

    @media (max-width: 680px) {
      .shell {
        width: min(100% - 20px, 720px);
        padding-top: 12px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        padding-bottom: 12px;
      }

      .toolbar,
      .doc-meta {
        align-items: stretch;
        flex-direction: column;
        width: 100%;
      }

      button,
      .file-label,
      .theme-toggle {
        width: 100%;
      }

      button,
      .file-label {
        justify-content: center;
      }

      .theme-toggle {
        justify-content: space-between;
      }

      .reader {
        min-height: calc(100vh - 250px);
        padding: 16px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .capture-panel {
        position: static;
        min-height: auto;
      }

      .panel-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Exocortex Reader</h1>
      <div class="toolbar">
        <label class="file-label">
          <input id="fileInput" type="file" accept=".txt,.md,.markdown,.html,.htm,text/*">
          Open File
        </label>
        <label class="theme-toggle" title="Toggle dark theme">
          <input id="themeToggle" type="checkbox" aria-label="Enable dark theme">
          <span>Dark</span>
        </label>
        <button id="addSelection" class="primary" type="button">Add Selection</button>
        <button id="clearReader" type="button">Clear</button>
        <button id="openGraph" type="button">Graph</button>
        <button id="openInbox" type="button">Inbox</button>
      </div>
    </header>

    <div id="status" class="status"></div>
    <div class="doc-meta">
      <strong id="docTitle">No file loaded</strong>
      <span id="selectionInfo">Select text, then right-click it.</span>
    </div>
    <div class="workspace">
      <main id="reader" class="reader empty">Open a UTF-8 text or Markdown file to start reading.</main>
      <aside class="capture-panel" aria-label="Graph thought capture">
        <div class="field">
          <label for="thoughtInput">Idea</label>
          <textarea id="thoughtInput" rows="7"></textarea>
        </div>
        <div id="sourceField" class="field source-field">
          <div class="source-actions">
            <label for="sourceInput">Source</label>
            <button id="toggleSource" type="button">Hide</button>
          </div>
          <textarea id="sourceInput" rows="8"></textarea>
        </div>
        <div class="panel-actions">
          <button id="saveThought" class="primary" type="button">Add Idea</button>
        </div>
      </aside>
    </div>
  </div>

  <div id="menu" class="menu" role="menu">
    <button id="menuAdd" class="primary" type="button">Add as Idea</button>
    <button id="menuAddSource" type="button">Add as Source</button>
  </div>

  <script>
    const state = {
      documentTitle: null,
      sourceUrl: null,
      fileMetadata: {},
      lastSelection: null,
      sourceSelection: null,
    };
    const THEME_STORAGE_KEY = "exocortex-theme";

    const fileInput = document.querySelector("#fileInput");
    const reader = document.querySelector("#reader");
    const status = document.querySelector("#status");
    const docTitle = document.querySelector("#docTitle");
    const selectionInfo = document.querySelector("#selectionInfo");
    const addSelection = document.querySelector("#addSelection");
    const clearReader = document.querySelector("#clearReader");
    const openGraph = document.querySelector("#openGraph");
    const openInbox = document.querySelector("#openInbox");
    const menu = document.querySelector("#menu");
    const menuAdd = document.querySelector("#menuAdd");
    const menuAddSource = document.querySelector("#menuAddSource");
    const themeToggle = document.querySelector("#themeToggle");
    const thoughtInput = document.querySelector("#thoughtInput");
    const sourceInput = document.querySelector("#sourceInput");
    const sourceField = document.querySelector("#sourceField");
    const toggleSource = document.querySelector("#toggleSource");
    const saveThought = document.querySelector("#saveThought");

    function applyTheme(theme) {
      const normalizedTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = normalizedTheme;
      themeToggle.checked = normalizedTheme === "dark";
      themeToggle.setAttribute(
        "aria-label",
        normalizedTheme === "dark" ? "Disable dark theme" : "Enable dark theme"
      );
    }

    function loadTheme() {
      try {
        return localStorage.getItem(THEME_STORAGE_KEY) || "light";
      } catch {
        return "light";
      }
    }

    function saveTheme(theme) {
      try {
        localStorage.setItem(THEME_STORAGE_KEY, theme);
      } catch {
        // Theme persistence is best-effort.
      }
    }

    function setStatus(text, isError = false) {
      status.textContent = text || "";
      status.classList.toggle("error", Boolean(isError));
    }

    function hideMenu() {
      menu.classList.remove("open");
    }

    function showMenu(x, y) {
      menu.classList.add("open");
      const width = menu.offsetWidth || 190;
      const height = menu.offsetHeight || 48;
      const left = Math.min(x, window.innerWidth - width - 8);
      const top = Math.min(y, window.innerHeight - height - 8);
      menu.style.left = `${Math.max(8, left)}px`;
      menu.style.top = `${Math.max(8, top)}px`;
    }

    function selectionInsideReader(range) {
      return reader.contains(range.commonAncestorContainer);
    }

    function currentSelection() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) {
        return null;
      }

      const rawText = selection.toString();
      const text = rawText.trim();
      if (!text) {
        return null;
      }

      const range = selection.getRangeAt(0);
      if (!selectionInsideReader(range)) {
        return null;
      }

      const before = range.cloneRange();
      before.selectNodeContents(reader);
      before.setEnd(range.startContainer, range.startOffset);
      const offsetStart = before.toString().length;
      const offsetEnd = offsetStart + rawText.length;

      return {
        text,
        offsetStart,
        offsetEnd,
        length: text.length,
      };
    }

    function updateSelectionInfo() {
      const selection = currentSelection();
      state.lastSelection = selection;
      selectionInfo.textContent = selection
        ? `${selection.length} characters selected`
        : "Select text, then right-click it.";
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!response.ok) {
        let detail = `${response.status} ${response.statusText}`;
        try {
          const payload = await response.json();
          detail = payload.detail || detail;
        } catch {
          // Keep HTTP fallback detail.
        }
        throw new Error(detail);
      }
      return response.json();
    }

    async function saveSelection(selection) {
      if (!selection) {
        setStatus("No selected text inside the reader.", true);
        return;
      }

      addSelection.disabled = true;
      menuAdd.disabled = true;
      try {
        const payload = {
          text: selection.text,
          source_type: "reader",
          source_url: state.sourceUrl,
          document_title: state.documentTitle,
          metadata: {
            ...state.fileMetadata,
            offset_start: selection.offsetStart,
            offset_end: selection.offsetEnd,
            selected_length: selection.length,
          },
        };
        const result = await requestJson("/api/manual-fragments", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        setStatus(`Added quote ${result.node_id.slice(0, 8)}... to graph.`);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        addSelection.disabled = false;
        menuAdd.disabled = false;
        hideMenu();
      }
    }

    function setSourceFromSelection(selection) {
      if (!selection) {
        setStatus("No selected text inside the reader.", true);
        return;
      }

      sourceInput.value = selection.text;
      state.sourceSelection = selection;
      sourceField.classList.remove("collapsed");
      toggleSource.textContent = "Hide";
      setStatus("Added selection as source.");
      hideMenu();
    }

    function setIdeaFromSelection(selection) {
      if (!selection) {
        setStatus("No selected text inside the reader.", true);
        return;
      }

      thoughtInput.value = selection.text;
      thoughtInput.focus();
      setStatus("Added selection as idea.");
      hideMenu();
    }

    async function saveThoughtNode() {
      const thought = thoughtInput.value.trim();
      const sourceText = sourceInput.value.trim();
      if (!thought) {
        setStatus("Write an idea before adding it to the graph.", true);
        thoughtInput.focus();
        return;
      }

      saveThought.disabled = true;
      try {
        const sourceMetadata = state.sourceSelection
          ? {
              source_offset_start: state.sourceSelection.offsetStart,
              source_offset_end: state.sourceSelection.offsetEnd,
              source_selected_length: state.sourceSelection.length,
            }
          : {};
        const payload = {
          text: thought,
          source_text: sourceText || null,
          node_type: "idea",
          source_type: "reader",
          source_url: state.sourceUrl,
          document_title: state.documentTitle,
          metadata: {
            ...state.fileMetadata,
            ...sourceMetadata,
            entry_mode: "reader_thought",
          },
        };
        const result = await requestJson("/api/manual-fragments", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        thoughtInput.value = "";
        sourceInput.value = "";
        state.sourceSelection = null;
        setStatus(`Added thought ${result.node_id.slice(0, 8)}... to graph.`);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        saveThought.disabled = false;
      }
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        return;
      }

      const fileReader = new FileReader();
      fileReader.onload = () => {
        const text = String(fileReader.result || "");
        state.documentTitle = file.name;
        state.sourceUrl = `local:${file.name}`;
        state.fileMetadata = {
          file_name: file.name,
          file_size: file.size,
          file_type: file.type || "text/plain",
          entry_mode: "manual_selection",
        };
        state.sourceSelection = null;
        thoughtInput.value = "";
        sourceInput.value = "";
        sourceField.classList.remove("collapsed");
        toggleSource.textContent = "Hide";
        docTitle.textContent = file.name;
        reader.textContent = text || "The file is empty.";
        reader.classList.toggle("empty", !text);
        setStatus(`Loaded ${file.name}.`);
        updateSelectionInfo();
      };
      fileReader.onerror = () => {
        setStatus("Could not read the selected file.", true);
      };
      fileReader.readAsText(file, "utf-8");
    });

    reader.addEventListener("mouseup", updateSelectionInfo);
    reader.addEventListener("keyup", updateSelectionInfo);
    reader.addEventListener("contextmenu", (event) => {
      updateSelectionInfo();
      if (!state.lastSelection) {
        hideMenu();
        return;
      }
      event.preventDefault();
      showMenu(event.clientX, event.clientY);
    });

    document.addEventListener("click", (event) => {
      if (!menu.contains(event.target)) {
        hideMenu();
      }
    });

    addSelection.addEventListener("click", () => {
      updateSelectionInfo();
      saveSelection(state.lastSelection);
    });

    menuAdd.addEventListener("click", () => {
      setIdeaFromSelection(state.lastSelection);
    });

    menuAddSource.addEventListener("click", () => {
      setSourceFromSelection(state.lastSelection);
    });

    saveThought.addEventListener("click", saveThoughtNode);

    toggleSource.addEventListener("click", () => {
      const collapsed = !sourceField.classList.contains("collapsed");
      sourceField.classList.toggle("collapsed", collapsed);
      toggleSource.textContent = collapsed ? "Show" : "Hide";
    });

    sourceInput.addEventListener("input", () => {
      state.sourceSelection = null;
    });

    themeToggle.addEventListener("change", () => {
      const theme = themeToggle.checked ? "dark" : "light";
      saveTheme(theme);
      applyTheme(theme);
    });

    clearReader.addEventListener("click", () => {
      state.documentTitle = null;
      state.sourceUrl = null;
      state.fileMetadata = {};
      state.lastSelection = null;
      state.sourceSelection = null;
      thoughtInput.value = "";
      sourceInput.value = "";
      sourceField.classList.remove("collapsed");
      toggleSource.textContent = "Hide";
      fileInput.value = "";
      docTitle.textContent = "No file loaded";
      reader.textContent = "Open a UTF-8 text or Markdown file to start reading.";
      reader.classList.add("empty");
      setStatus("");
      updateSelectionInfo();
      hideMenu();
    });

    openInbox.addEventListener("click", () => {
      window.location.href = "/app";
    });

    openGraph.addEventListener("click", () => {
      window.location.href = "/graph";
    });

    applyTheme(loadTheme());
  </script>
</body>
</html>
